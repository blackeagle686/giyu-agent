<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giyu | System Stability Guardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <canvas id="bg-net"></canvas>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-content">
            <span class="loader-icon">🌊</span>
            <h2>Initializing Giyu Agent</h2>
            <p>Loading AI modules & Phoenix framework...</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="header-slot"></div>

        <main class="row g-3 g-xl-4">
            <div id="command-slot"></div>
            <div id="sidebar-slot"></div>
            <div id="metrics-slot"></div>
        </main>

        <div id="footer-slot"></div>
    </div>

    <div class="powered-by-badge">
        <div class="badge-glow"></div>
        <div class="badge-content">
            <div class="badge-icon">
                <i class="bi bi-cpu-fill"></i>
            </div>
            <div class="badge-text">
                <span class="powered-text">POWERED BY <span class="highlight">PHOENIX-AI</span></span>
                <span class="arch-text">ASHBORN AGENT ARCHITECTURE</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
